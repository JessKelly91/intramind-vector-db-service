version: '3.8'

services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.0
    container_name: weaviate-dev
    restart: unless-stopped
    ports:
      - "8080:8080"     # HTTP/REST API
      - "50051:50051"   # gRPC API
    environment:
      # Query Configuration
      QUERY_DEFAULTS_LIMIT: 25
      
      # Authentication - Anonymous access enabled for local development
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      
      # Persistence
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      
      # Vectorizer Configuration - Uses free local transformers by default
      DEFAULT_VECTORIZER_MODULE: 'text2vec-transformers'
      
      # Modules - text2vec-transformers enabled (free, local)
      # To use OpenAI instead, add 'text2vec-openai' and set OPENAI_APIKEY below
      ENABLE_MODULES: 'text2vec-transformers'
      
      # Transformers Configuration
      TRANSFORMERS_INFERENCE_API: 'http://t2v-transformers:8080'
      
      # OpenAI Configuration (Optional - uncomment and add API key to use)
      # OPENAI_APIKEY: ${OPENAI_API_KEY:-}
      
      # Cluster Configuration
      CLUSTER_HOSTNAME: 'node1'
      
      # Logging
      LOG_LEVEL: 'info'
    volumes:
      - weaviate_data:/var/lib/weaviate
    depends_on:
      - t2v-transformers
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  t2v-transformers:
    image: cr.weaviate.io/semitechnologies/transformers-inference:sentence-transformers-all-MiniLM-L6-v2
    container_name: weaviate-transformers
    restart: unless-stopped
    environment:
      ENABLE_CUDA: '0'  # Set to '1' if you have NVIDIA GPU support
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  weaviate_data:
    driver: local

