name: Test Python Package

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'vector-db-contracts/python/**'
      - 'vector-db-contracts/src/VectorDB.Contracts/Protos/**'
      - 'vector-db-contracts/VERSION'
      - '.github/workflows/test-python-package.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'vector-db-contracts/python/**'
      - 'vector-db-contracts/src/VectorDB.Contracts/Protos/**'
      - 'vector-db-contracts/VERSION'
      - '.github/workflows/test-python-package.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: vector-db-contracts/python
      run: |
        python -m pip install --upgrade pip
        pip install grpcio-tools build twine
        pip install -e ".[dev]"
    
    - name: Generate protobuf code
      working-directory: vector-db-contracts/python
      run: |
        python scripts/generate_protos.py
    
    - name: Check generated files exist
      working-directory: vector-db-contracts/python
      run: |
        test -f vectordb_contracts/vector_service_pb2.py || (echo "vector_service_pb2.py not found" && exit 1)
        test -f vectordb_contracts/vector_service_pb2_grpc.py || (echo "vector_service_pb2_grpc.py not found" && exit 1)
        echo "✓ Generated files found"
    
    - name: Test imports
      working-directory: vector-db-contracts/python
      run: |
        python -c "from vectordb_contracts import vector_service_pb2"
        python -c "from vectordb_contracts import vector_service_pb2_grpc"
        echo "✓ Import test passed"
    
    - name: Build package
      working-directory: vector-db-contracts/python
      run: |
        python -m build
    
    - name: Check package with twine
      working-directory: vector-db-contracts/python
      run: |
        twine check dist/*
    
    - name: List package contents
      working-directory: vector-db-contracts/python
      run: |
        echo "Built packages:"
        ls -lh dist/

  build-summary:
    name: Build Summary
    needs: test
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Check build status
      run: |
        if [ "${{ needs.test.result }}" = "success" ]; then
          echo "✅ All Python package tests passed!"
        else
          echo "❌ Python package tests failed"
          exit 1
        fi

