name: Publish Python to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to use VERSION file)'
        required: false
        type: string
  release:
    types: [published]

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/vectordb-contracts/
    permissions:
      id-token: write  # For trusted publishing
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Read version
      id: version
      working-directory: vector-db-contracts
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
        else
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        fi
        echo "Publishing version: $(cat $GITHUB_OUTPUT | grep version | cut -d= -f2)"
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine grpcio-tools
    
    - name: Generate protobuf code
      working-directory: vector-db-contracts/python
      run: |
        python scripts/generate_protos.py
    
    - name: Build package
      working-directory: vector-db-contracts/python
      run: |
        python -m build
    
    - name: Check package
      working-directory: vector-db-contracts/python
      run: |
        twine check dist/*
    
    - name: List package contents
      working-directory: vector-db-contracts/python
      run: |
        echo "📦 Built packages:"
        ls -lh dist/
        echo ""
        echo "Package version: ${{ steps.version.outputs.version }}"
    
    - name: Publish to PyPI (with API token)
      if: ${{ secrets.PYPI_API_TOKEN != '' }}
      working-directory: vector-db-contracts/python
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        twine upload dist/*
    
    - name: Publish to PyPI (trusted publishing)
      if: ${{ secrets.PYPI_API_TOKEN == '' }}
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: vector-db-contracts/python/dist/
    
    - name: Installation instructions
      run: |
        echo "✅ Package published to PyPI!"
        echo ""
        echo "To install:"
        echo "  pip install vectordb-contracts"
        echo ""
        echo "To test imports:"
        echo "  python -c 'from vectordb_contracts import vector_service_pb2, vector_service_pb2_grpc'"
        echo ""
        echo "View on PyPI: https://pypi.org/project/vectordb-contracts/${{ steps.version.outputs.version }}/"

