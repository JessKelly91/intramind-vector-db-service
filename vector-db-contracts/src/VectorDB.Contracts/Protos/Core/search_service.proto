syntax = "proto3";

package vectordb.core.v1;
option csharp_namespace = "VectorDB.Contracts.Core.V1";

import "Core/search_messages.proto";

// Service for search operations
service SearchService {
  // Perform semantic search
  rpc SemanticSearch(SemanticSearchRequest) returns (SemanticSearchResponse);
  
  // Perform streaming semantic search
  rpc StreamSearch(StreamSearchRequest) returns (stream SearchResult);
}

