syntax = "proto3";

package vectordb.core.v1;
option csharp_namespace = "VectorDB.Contracts.Core.V1";

// ============================================================================
// Health Check Messages
// ============================================================================

message HealthCheckRequest {
  string service = 1;
}

message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    SERVICE_UNKNOWN = 3;
  }

  ServingStatus status = 1;
  string weaviate_status = 2;
  string version = 3;
  string environment = 4;
  int64 uptime_seconds = 5;
}

