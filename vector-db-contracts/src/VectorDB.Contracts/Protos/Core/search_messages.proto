syntax = "proto3";

package vectordb.core.v1;
option csharp_namespace = "VectorDB.Contracts.Core.V1";

// ============================================================================
// Search Operations Messages
// ============================================================================

message SemanticSearchRequest {
  string collection_name = 1;
  string query = 2;
  int32 limit = 3;
  double min_score = 4;
  string correlation_id = 5;
  bool return_metadata = 6;
  map<string, string> filters = 7;  // Optional metadata filters
}

message SemanticSearchResponse {
  repeated SearchResult results = 1;
  int32 total_count = 2;
  int64 execution_time_ms = 3;
  bool success = 4;
  string error_message = 5;
}

message SearchResult {
  string vector_id = 1;
  string content = 2;
  double score = 3;
  map<string, string> metadata = 4;
}

message StreamSearchRequest {
  string collection_name = 1;
  string query = 2;
  int32 limit = 3;
  double min_score = 4;
  string correlation_id = 5;
  bool return_metadata = 6;
  map<string, string> filters = 7;
}

