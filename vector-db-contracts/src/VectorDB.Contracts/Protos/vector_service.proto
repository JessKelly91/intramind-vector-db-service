syntax = "proto3";

package vectordb;
option csharp_namespace = "VectorDB.Contracts";

// Import all domain messages (services are not needed since we directly reference messages)
import "Core/collections_messages.proto";
import "Core/documents_messages.proto";
import "Core/search_messages.proto";
import "Core/health_messages.proto";

// Main Vector Database Service
// This service composes all domain services into a single unified service
service VectorService {
  // Collection operations
  rpc CreateCollection(vectordb.core.v1.CreateCollectionRequest) returns (vectordb.core.v1.CreateCollectionResponse);
  rpc ListCollections(vectordb.core.v1.ListCollectionsRequest) returns (vectordb.core.v1.ListCollectionsResponse);
  rpc GetCollection(vectordb.core.v1.GetCollectionRequest) returns (vectordb.core.v1.GetCollectionResponse);
  rpc DeleteCollection(vectordb.core.v1.DeleteCollectionRequest) returns (vectordb.core.v1.DeleteCollectionResponse);

  // Document/Vector operations
  rpc InsertVector(vectordb.core.v1.InsertVectorRequest) returns (vectordb.core.v1.InsertVectorResponse);
  rpc InsertVectorBatch(vectordb.core.v1.InsertVectorBatchRequest) returns (vectordb.core.v1.InsertVectorBatchResponse);
  rpc GetVector(vectordb.core.v1.GetVectorRequest) returns (vectordb.core.v1.GetVectorResponse);
  rpc UpdateVector(vectordb.core.v1.UpdateVectorRequest) returns (vectordb.core.v1.UpdateVectorResponse);
  rpc DeleteVector(vectordb.core.v1.DeleteVectorRequest) returns (vectordb.core.v1.DeleteVectorResponse);

  // Search operations
  rpc SemanticSearch(vectordb.core.v1.SemanticSearchRequest) returns (vectordb.core.v1.SemanticSearchResponse);
  rpc StreamSearch(vectordb.core.v1.StreamSearchRequest) returns (stream vectordb.core.v1.SearchResult);

  // Health check
  rpc HealthCheck(vectordb.core.v1.HealthCheckRequest) returns (vectordb.core.v1.HealthCheckResponse);
}
