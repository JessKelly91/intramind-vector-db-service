syntax = "proto3";

package vectordb;

// Vector Database Service
// Internal microservice for vector database operations
service VectorDBService {
  // Vector CRUD operations
  rpc InsertVector(InsertVectorRequest) returns (VectorResponse);
  rpc InsertVectorBatch(InsertVectorBatchRequest) returns (BatchResponse);
  rpc GetVector(GetVectorRequest) returns (VectorResponse);
  rpc DeleteVector(DeleteVectorRequest) returns (DeleteResponse);
  rpc UpdateVector(UpdateVectorRequest) returns (VectorResponse);

  // Search operations
  rpc SemanticSearch(SearchRequest) returns (SearchResponse);
  rpc StreamSearch(SearchRequest) returns (stream SearchResult);

  // Collection operations
  rpc CreateCollection(CreateCollectionRequest) returns (CollectionResponse);
  rpc ListCollections(ListCollectionsRequest) returns (CollectionsResponse);
  rpc GetCollection(GetCollectionRequest) returns (CollectionResponse);
  rpc DeleteCollection(DeleteCollectionRequest) returns (DeleteResponse);

  // Health check
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// ============================================================================
// Vector Operations Messages
// ============================================================================

message InsertVectorRequest {
  string collection_name = 1;
  string content = 2;
  map<string, string> metadata = 3;
  string correlation_id = 4;
  string created_at = 5;  // ISO 8601 timestamp
}

message InsertVectorBatchRequest {
  string collection_name = 1;
  repeated VectorDocument documents = 2;
  string correlation_id = 3;
}

message VectorDocument {
  string content = 1;
  map<string, string> metadata = 2;
  string created_at = 3;
}

message GetVectorRequest {
  string collection_name = 1;
  string vector_id = 2;
  string correlation_id = 3;
}

message UpdateVectorRequest {
  string collection_name = 1;
  string vector_id = 2;
  string content = 3;
  map<string, string> metadata = 4;
  string correlation_id = 5;
}

message DeleteVectorRequest {
  string collection_name = 1;
  string vector_id = 2;
  string correlation_id = 3;
}

message VectorResponse {
  string id = 1;
  string content = 2;
  map<string, string> metadata = 3;
  string created_at = 4;
  bool success = 5;
  string error_message = 6;
}

message BatchResponse {
  repeated string ids = 1;
  int32 total_inserted = 2;
  int32 total_failed = 3;
  bool success = 4;
  string error_message = 5;
}

message DeleteResponse {
  bool success = 1;
  string message = 2;
  string error_message = 3;
}

// ============================================================================
// Search Messages
// ============================================================================

message SearchRequest {
  string collection_name = 1;
  string query = 2;
  int32 limit = 3;
  string correlation_id = 4;
  bool return_metadata = 5;
  map<string, string> filters = 6;  // Optional metadata filters
}

message SearchResponse {
  repeated SearchResult results = 1;
  int32 total_count = 2;
  float duration_ms = 3;
  bool success = 4;
  string error_message = 5;
}

message SearchResult {
  string id = 1;
  string content = 2;
  float score = 3;
  map<string, string> metadata = 4;
}

// ============================================================================
// Collection Operations Messages
// ============================================================================

message CreateCollectionRequest {
  string collection_name = 1;
  string description = 2;
  string vectorizer = 3;  // e.g., "text2vec-openai"
  string correlation_id = 4;
}

message ListCollectionsRequest {
  string correlation_id = 1;
}

message GetCollectionRequest {
  string collection_name = 1;
  string correlation_id = 2;
}

message DeleteCollectionRequest {
  string collection_name = 1;
  string correlation_id = 2;
}

message CollectionResponse {
  string name = 1;
  string description = 2;
  int32 document_count = 3;
  string vectorizer = 4;
  bool success = 5;
  string error_message = 6;
}

message CollectionsResponse {
  repeated string collection_names = 1;
  int32 total_count = 2;
  bool success = 3;
  string error_message = 4;
}

// ============================================================================
// Health Check Messages
// ============================================================================

message HealthCheckRequest {
  string service = 1;
}

message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    SERVICE_UNKNOWN = 3;
  }

  ServingStatus status = 1;
  string weaviate_status = 2;
  string version = 3;
  string environment = 4;
  int64 uptime_seconds = 5;
}
